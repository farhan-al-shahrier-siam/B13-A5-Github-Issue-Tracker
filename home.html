<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GitHub | Home</title>

        <!-- font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <!-- tailwind/DaisyUI  -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <!-- google font  -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

        <style>
            * {
                font-family: "Geist", sans-serif;
            }
        </style>
    </head>
    <body>
        <nav>
            <div class="navbar bg-base-100 shadow-sm flex justify-between">
                <div class="flex items-center justify-center gap-1">
                    <img src="./assets/github-logo_25231 1.png" alt="" />
                    <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
                </div>
                <div class="flex gap-2">
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search issues..." />
                    </label>
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </nav>

        <main>
            <!-- toggle Buttons all, open closed -->
            <section class="max-w-[1110px] mx-auto p-6 shadow-lg rounded-lg mt-12">
                <button onclick="toggleButtons('all-btn')" id="all-btn" class="top-btn btn btn-primary py-3 px-12">All</button>
                <button onclick="toggleButtons('open-btn')" id="open-btn" class="top-btn btn py-3 px-12">Open</button>
                <button onclick="toggleButtons('closed-btn')" id="closed-btn" class="top-btn btn py-3 px-12">Closed</button>
            </section>

            <section class="max-w-[1110px] mx-auto p-6 shadow-lg rounded-lg mt-4 flex justify-between items-center">
                <div class="flex gap-2">
                    <img class="bg-[#ECE4FF] rounded-full p-[9px]" src="./assets/Aperture.png" alt="" />
                    <div>
                        <h2><span id="total-issues">0</span> Issues</h2>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <p>
                        <span class="text-[#00A96E]"><i class="fa-solid fa-circle"></i></span> Open
                    </p>
                    <p>
                        <span class="text-[#A855F7]"><i class="fa-solid fa-circle"></i></span> Closed
                    </p>
                </div>
            </section>

            <!-- all issues depend on button selection -->
            <section class="max-w-[1110px] mx-auto p-6 shadow-lg rounded-lg">
                <!-- issue cards -->
                
            </section>
        </main>

        <script src="./script/home.js"></script>
    </body>
</html>
