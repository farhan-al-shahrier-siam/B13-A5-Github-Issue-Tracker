<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GitHub | Sign In</title>

        <!-- tailwind/DaisyUI  -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <!-- google font  -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

        <style>
            * {
                font-family: "Geist", sans-serif;
            }
        </style>
    </head>
    <body>
        <section class="max-w-[520px] mx-auto shadow-2xl m-20">
            <div class="text-center p-8">
                <img class="mx-auto" src="./assets/github-logo.png" alt="" />
                <h2 class="font-semibold text-2xl mt-6">GitHub Issues Tracker</h2>
                <p class="text-[#64748B] mt-1">Sign in to manage your issues</p>
            </div>
            <div class="px-8 space-y-2">
                <p class="">Username</p>
                <input id="input-username" class="rounded-lg p-4 w-full" placeholder="Enter Username" type="text" />
                <p class="text-xs text-blue-600">Default: admin</p>
                <p class="mt-3">Password</p>
                <input id="input-password" type="password" class="rounded-lg p-4 w-full" placeholder="Enter Password" name="" id="" />
                <p class="text-xs text-blue-600">Default: admin123</p>
                <button id="signIn-btn" class="btn btn-primary w-full mt-5 rounded-lg p-4">Sign In</button>
                <div class="flex justify-between items-center">
                    <div class="w-full border-t border-gray-300"></div>
                    <p>OR</p>
                    <div class="w-full border-t my-6 border-gray-300"></div>
                </div>
                <div class="text-center pb-8 ">
                    <p class="text-gray-500 mb-2">Demo Credentials:</p>
                    <div class="max-w-[456px] bg-[#1f293711] py-6 rounded-lg">
                        <p><span>Username:</span> admin</p>
                        <p><span>Password:</span> admin123</p>
                    </div>
                </div>
            </div>
        </section>

        <script src="./script/login.js"></script>
    </body>
</html>
